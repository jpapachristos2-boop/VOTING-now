<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eurovision Final — Μυστική Ψηφοφορία</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#003189;--red:#ED2939;--gold:#F5C518;--bg:#F7F5F0;--card:#fff;--text:#1a1a2e;--muted:#6b6b7e;--border:rgba(0,0,0,.1);--light-blue:#E6F1FB}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:3rem}
.screen{display:none;max-width:580px;margin:0 auto;padding:2rem 1rem}
.screen.active{display:block}
.eu-header{text-align:center;margin-bottom:2rem}
.eu-flag{font-size:2.5rem;display:block;margin-bottom:.5rem}
.eu-title{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,4vw,2rem);color:var(--blue)}
.eu-sub{font-size:13px;color:var(--muted);margin-top:5px}
.section-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:.6rem}
.voter-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;background:#fff;color:var(--text);margin-bottom:8px}
.voter-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,49,137,.1)}
.btn{width:100%;padding:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;border:none;border-radius:10px;cursor:pointer;transition:opacity .15s}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{opacity:.9}
.btn-blue:disabled{opacity:.35;cursor:not-allowed}
.btn-red{background:var(--red);color:#fff;margin-top:8px}
.btn-red:hover{opacity:.9}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);margin-top:8px}
.btn-ghost:hover{background:#eee}
.voters-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.vtag{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:#fff;color:var(--text)}
.vtag.done{background:var(--blue);color:#fff;border-color:var(--blue)}
.vtag.active{border-color:var(--blue);color:var(--blue);font-weight:500}
.progress-bar{height:4px;background:#e0e0e0;border-radius:4px;margin-bottom:1.25rem;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .3s}
.song-card{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--border);border-radius:12px;margin-bottom:8px;background:#fff;transition:border-color .15s,background .15s}
.song-card.selected{border-color:var(--blue);background:var(--light-blue)}
.song-num{font-size:11px;color:var(--muted);min-width:16px;text-align:right;flex-shrink:0}
.song-info{flex:1;min-width:0}
.song-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-card.selected .song-title{color:var(--blue)}
.song-artist{font-size:11px;color:var(--muted);margin-top:1px}
.pts-row{display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end}
.pts-btn{font-size:11px;padding:3px 7px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .1s}
.pts-btn:hover:not(.disabled){background:#f0f0f5;border-color:#aaa}
.pts-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500}
.pts-btn.active-12{background:var(--red);color:#fff;border-color:var(--red);font-weight:500}
.pts-btn.disabled{opacity:.25;cursor:not-allowed}
.submit-info{font-size:12px;color:var(--muted);text-align:center;margin-bottom:.6rem}
.wait-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:1.5rem;text-align:center;margin-bottom:1.25rem}
.wait-icon{font-size:3rem;margin-bottom:.75rem}
.wait-name{font-size:18px;font-weight:500;color:var(--blue);margin-bottom:.25rem}
.result-song{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:12px;margin-bottom:9px;background:#fff;border:1px solid var(--border)}
.result-song.gold{border-color:#F5C518;background:#FAEEDA}
.result-song.silver{border-color:#B4B2A9;background:#F1EFE8}
.result-song.bronze{border-color:#D85A30;background:#FAECE7}
.medal{font-size:1.5rem;min-width:30px;text-align:center}
.result-info{flex:1}
.result-title{font-size:15px;font-weight:500}
.result-artist{font-size:12px;color:var(--muted);margin-top:1px}
.result-pts{font-size:20px;font-weight:500;color:var(--blue)}
.result-pts-lbl{font-size:10px;color:var(--muted)}
.bd-voter{margin-bottom:1rem}
.bd-name{font-size:13px;font-weight:500;margin-bottom:5px}
.bd-tag{display:inline-flex;gap:4px;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;background:#f0f0f5;color:var(--muted);margin:2px;border:1px solid var(--border)}
</style>
</head>
<body>

<!-- SETUP -->
<div id="s-setup" class="screen active">
  <div class="eu-header">
    <span class="eu-flag">🇫🇷</span>
    <div class="eu-title">Eurovision — Grand Final</div>
    <div class="eu-sub">Μυστική Ψηφοφορία · Τελικός</div>
  </div>
  <div class="section-label">Ονόματα ψηφοφόρων</div>
  <input class="voter-input" placeholder="Ψηφοφόρος 1" id="v0" />
  <input class="voter-input" placeholder="Ψηφοφόρος 2" id="v1" />
  <input class="voter-input" placeholder="Ψηφοφόρος 3" id="v2" />
  <input class="voter-input" placeholder="Ψηφοφόρος 4 (προαιρετικό)" id="v3" />
  <br>
  <button class="btn btn-blue" onclick="startVoting()">Έναρξη ψηφοφορίας ▶</button>
</div>

<!-- VOTE -->
<div id="s-vote" class="screen">
  <div class="eu-header">
    <span class="eu-flag">🗳️</span>
    <div class="eu-title" id="vote-name">—</div>
    <div class="eu-sub">Δώσε βαθμούς — κάθε βαθμολογία μόνο μία φορά</div>
  </div>
  <div class="voters-row" id="voters-row-vote"></div>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div id="songs-list"></div>
  <p class="submit-info" id="submit-info"></p>
  <button class="btn btn-blue" id="submit-btn" onclick="submitVote()" disabled>Υποβολή ψήφου ✓</button>
</div>

<!-- WAIT -->
<div id="s-wait" class="screen">
  <div class="wait-card">
    <div class="wait-icon">✅</div>
    <div class="wait-name" id="wait-name">—</div>
    <div style="font-size:13px;color:var(--muted);margin-top:4px" id="wait-sub">Ψήφος καταχωρήθηκε!</div>
  </div>
  <div class="voters-row" id="voters-row-wait"></div>
  <button class="btn btn-blue" id="next-btn" onclick="nextVoter()">Επόμενος ψηφοφόρος ▶</button>
  <button class="btn btn-red" id="results-btn" onclick="showResults()" style="display:none">🏆 Αποτελέσματα!</button>
</div>

<!-- RESULTS -->
<div id="s-results" class="screen">
  <div class="eu-header">
    <span class="eu-flag">🏆</span>
    <div class="eu-title">Αποτελέσματα Τελικού</div>
    <div class="eu-sub" id="results-sub"></div>
  </div>
  <div id="results-list"></div>
  <br>
  <div class="section-label">Αναλυτικά ανά ψηφοφόρο</div>
  <div id="breakdown"></div>
  <button class="btn btn-ghost" onclick="resetAll()">↺ Νέα ψηφοφορία</button>
</div>

<script>
const SONGS=[
  {title:"Évidemment",artist:"La Zarra"},
  {title:"Regarde !",artist:"Monroe"},
  {title:"Voilà",artist:"Barbara Pravi"},
  {title:"Maman",artist:"Louane"},
  {title:"J'ai cherché",artist:"Amir"},
  {title:"Je veux",artist:"Zaz"},
];
const PTS=[1,2,3,4,5,6,7,8,10,12];
let voters=[],currentVoter=0,allVotes={},curVotes={},usedPts=new Set();

function startVoting(){
  const v=['v0','v1','v2','v3'].map(id=>document.getElementById(id).value.trim()).filter(Boolean);
  if(v.length<2){alert('Χρειάζονται τουλάχιστον 2 ψηφοφόροι!');return;}
  voters=v;currentVoter=0;allVotes={};
  loadVoteScreen();
}

function loadVoteScreen(){
  curVotes={};usedPts=new Set();
  showScreen('s-vote');
  document.getElementById('vote-name').textContent='Ψηφίζει: '+voters[currentVoter];
  document.getElementById('submit-btn').disabled=true;
  document.getElementById('submit-info').textContent='';
  renderVotersRow('voters-row-vote');
  renderSongs();updateProg();
}

function renderVotersRow(id){
  document.getElementById(id).innerHTML=voters.map((v,i)=>{
    let c='vtag';
    if(allVotes[v])c+=' done';
    else if(i===currentVoter)c+=' active';
    const ico=allVotes[v]?'✓ ':(i===currentVoter?'▶ ':'');
    return`<span class="${c}">${ico}${v}</span>`;
  }).join('');
}

function renderSongs(){
  document.getElementById('songs-list').innerHTML=SONGS.map((s,i)=>{
    const sel=curVotes[i]!==undefined;
    return`<div class="song-card${sel?' selected':''}">
      <span class="song-num">${i+1}</span>
      <div class="song-info"><div class="song-title">${s.title}</div><div class="song-artist">${s.artist}</div></div>
      <div class="pts-row">${PTS.map(p=>{
        const isA=curVotes[i]===p,isD=usedPts.has(p)&&!isA;
        let c='pts-btn'+(isA?(p===12?' active-12':' active'):'')+(isD?' disabled':'');
        return`<button class="${c}" onclick="vote(${i},${p})">${p}</button>`;
      }).join('')}</div></div>`;
  }).join('');
}

function vote(idx,pts){
  const prev=curVotes[idx];
  if(prev!==undefined)usedPts.delete(prev);
  if(prev===pts){delete curVotes[idx];}else{curVotes[idx]=pts;usedPts.add(pts);}
  const n=Object.keys(curVotes).length;
  document.getElementById('submit-info').textContent=n+' / '+SONGS.length+' τραγούδια βαθμολογήθηκαν';
  document.getElementById('submit-btn').disabled=n<SONGS.length;
  renderSongs();updateProg();
}

function updateProg(){
  document.getElementById('prog').style.width=(Object.keys(curVotes).length/SONGS.length*100)+'%';
}

function submitVote(){
  allVotes[voters[currentVoter]]={...curVotes};
  showScreen('s-wait');
  document.getElementById('wait-name').textContent=voters[currentVoter]+' ψήφισε!';
  renderVotersRow('voters-row-wait');
  const rem=voters.filter(v=>!allVotes[v]);
  if(rem.length===0){
    document.getElementById('wait-sub').textContent='Όλοι ψήφισαν! Ώρα για αποτελέσματα!';
    document.getElementById('next-btn').style.display='none';
    document.getElementById('results-btn').style.display='block';
  }else{
    document.getElementById('wait-sub').textContent='Απομένει: '+rem.join(', ');
    document.getElementById('next-btn').style.display='block';
    document.getElementById('results-btn').style.display='none';
  }
}

function nextVoter(){
  currentVoter=voters.findIndex(v=>!allVotes[v]);
  if(currentVoter===-1){showResults();return;}
  loadVoteScreen();
}

function showResults(){
  showScreen('s-results');
  const totals=SONGS.map((_,i)=>({idx:i,pts:voters.reduce((s,v)=>s+(allVotes[v]?.[i]||0),0)}));
  totals.sort((a,b)=>b.pts-a.pts);
  const medals=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'];
  const cls=['gold','silver','bronze','','',''];
  document.getElementById('results-sub').textContent=voters.length+' ψηφοφόροι · '+SONGS.length+' τραγούδια';
  document.getElementById('results-list').innerHTML=totals.map((t,r)=>`
    <div class="result-song ${cls[r]||''}">
      <span class="medal">${medals[r]||''}</span>
      <div class="result-info"><div class="result-title">${SONGS[t.idx].title}</div><div class="result-artist">${SONGS[t.idx].artist}</div></div>
      <div style="text-align:right"><div class="result-pts">${t.pts}</div><div class="result-pts-lbl">πόντοι</div></div>
    </div>`).join('');
  let bd='';
  voters.forEach(v=>{
    const sorted=Object.entries(allVotes[v]).sort((a,b)=>b[1]-a[1]);
    bd+=`<div class="bd-voter"><div class="bd-name">${v}</div><div>${sorted.map(([i,p])=>`<span class="bd-tag">${p}pts → ${SONGS[i].title}</span>`).join('')}</div></div>`;
  });
  document.getElementById('breakdown').innerHTML=bd;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function resetAll(){
  voters=[];currentVoter=0;allVotes={};curVotes={};usedPts=new Set();
  ['v0','v1','v2','v3'].forEach(id=>document.getElementById(id).value='');
  showScreen('s-setup');
}
</script>
</body>
</html>
